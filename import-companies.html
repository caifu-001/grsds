const BATCH = 20;
let done = 0, failed = 0;

function log(msg, cls) {
  const el = document.getElementById('log');
  el.classList.add('show');
  el.innerHTML += '<div class="' + (cls||'') + '">' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}

function updateStats() {
  document.getElementById('done').textContent = done;
  document.getElementById('fail').textContent = failed;
  const pct = Math.round((done + failed) / companies.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + '/' + companies.length + ' (' + pct + '%)';
}

async function doImport() {
  const btn = document.getElementById('btn-import');
  btn.disabled = true;
  btn.textContent = '导入中...';
  document.getElementById('progress-wrap').style.display = 'block';
  done = 0; failed = 0;
  log('开始导入 ' + companies.length + ' 家企业...', 'info');

  for (let i = 0; i < companies.length; i += BATCH) {
    const batch = companies.slice(i, i + BATCH).map(function(name) { return {name: name, base: '重庆市'}; });
    try {
      const { error } = await sb.from('companies').upsert(batch, {onConflict: 'name', ignoreDuplicates: true});
      if (error) {
        if (error.message && error.message.indexOf('policy') >= 0) {
          log('RLS策略阻止写入。请在Supabase SQL Editor执行以下SQL后重试:', 'err');
          log("CREATE POLICY anon_can_insert ON companies FOR INSERT WITH CHECK (true);", 'info');
          failed += batch.length;
          break;
        }
        log('批次' + (Math.floor(i/BATCH)+1) + '失败: ' + error.message, 'err');
        failed += batch.length;
      } else {
        done += batch.length;
        log('OK 批次' + (Math.floor(i/BATCH)+1) + ': ' + batch.length + '条', 'ok');
      }
    } catch(e) {
      log('网络错误: ' + e.message, 'err');
      failed += batch.length;
    }
    updateStats();
    await new Promise(function(r) { setTimeout(r, 200); });
  }

  log(done > 0 ? '完成! 成功导入 ' + done + ' 家, 失败 ' + failed + ' 家' : '导入失败', done > 0 ? 'ok' : 'err');
  btn.disabled = false;
  btn.textContent = '重新导入';
}
